<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCMS - QA Compliance Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>QA Compliance Management System</h1>
    <p>Wayne Sanderson Farms - Union Springs</p>
</header>

<main>

    <div id="homePanel">
        <div class="hero-card">
            <h2>Welcome to QCMS</h2>
            <p>
                Electronic compliance inspections, sanitation records,
                QA verification, and audit documentation.
            </p>
        </div>

        <div class="menu-grid">
            <button class="menu-button" onclick="showInspection()">Start Inspection</button>
            <button class="menu-button" onclick="showOpenInspections()">Open Inspections</button>
            <button class="menu-button" onclick="showCompletedInspections()">Completed Inspections</button>
            <button class="menu-button" disabled>QA Review</button>
        </div>
    </div>

    <div id="inspectionPanel" class="hidden">
        <div class="inspection-card">

            <div class="inspection-header-row">
                <button class="back-button" onclick="backToHome()">← Back to Home</button>
                <h2>Inspection Entry</h2>
            </div>

            <label><strong>Select Inspection</strong></label>
            <select id="inspectionSelect">
                <option value="">Select Inspection</option>
            </select>

            <div id="inspectionInfo" class="inspection-info hidden"></div>
            <div id="checklistContainer" class="hidden"></div>

        </div>
    </div>

    <div id="openInspectionsPanel" class="hidden">
        <div class="inspection-card">

            <div class="inspection-header-row">
                <button class="back-button" onclick="backToHome()">← Back to Home</button>
                <h2>Open Inspections</h2>
            </div>

            <div id="openInspectionList"></div>

        </div>
    </div>

    <div id="completedInspectionsPanel" class="hidden">
        <div class="inspection-card">

            <div class="inspection-header-row">
                <button class="back-button" onclick="backToHome()">← Back to Home</button>
                <h2>Completed Inspections</h2>
            </div>

            <div id="completedInspectionList"></div>

        </div>
    </div>

    <div id="inspectionDetailsPanel" class="hidden">
        <div class="inspection-card">

            <div class="inspection-header-row">
                <button class="back-button" onclick="showOpenInspections()">← Back to Open Inspections</button>
                <h2>Inspection Details</h2>
            </div>

            <div id="inspectionDetailsContent"></div>

        </div>
    </div>

</main>

<script src="app.js"></script>

</body>
</html>
